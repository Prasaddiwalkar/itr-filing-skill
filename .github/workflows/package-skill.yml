name: Package Skill

on:
  push:
    branches: [main]
    paths:
      - 'skill/**'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package skill
        run: |
          cd skill
          VERSION=$(date +%Y.%m.%d)
          zip -r ../releases/itr-filing-latest.skill .
          zip -r ../releases/itr-filing-v${VERSION}.skill .
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Commit releases
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add releases/
          git diff --staged --quiet || git commit -m "chore: auto-package skill v${{ env.VERSION }} [skip ci]"
          git push
