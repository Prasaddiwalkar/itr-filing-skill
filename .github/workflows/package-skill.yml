name: Package Skill

on:
  push:
    branches: [main]
    paths:
      - 'skill/**'
      - '.github/workflows/package-skill.yml'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Package skill
        run: |
          mkdir -p releases
          cd skill
          zip -r ../releases/itr-filing-latest.skill .
          zip -r ../releases/itr-filing-v${{ steps.version.outputs.VERSION }}.skill .

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          tag: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generateReleaseNotes: true
          artifacts: "releases/*.skill"
          draft: false
          prerelease: false
